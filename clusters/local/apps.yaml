apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: local-cluster
  namespace: flux-system
spec:
  interval: 60s
  retryInterval: 2m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/local
  prune: true
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age