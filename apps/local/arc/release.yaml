apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: actions-runner-controller
  namespace: arc
spec:
  interval: 60m # How often to reconcile the release

  install:
    remediation:
      retries: 3
    crds: CreateReplace

  upgrade:
    crds: CreateReplace

  chart:
    spec:
      chart: actions-runner-controller
      version: '0.13.1'
      sourceRef:
        kind: HelmRepository
        name: github-action-runner-controller-repo
        namespace: arc
      interval: 12h

  values:
    replicaCount: 2
    crds:
      enabled: true