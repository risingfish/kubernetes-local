# bgp-cluster-config.yaml
apiVersion: cilium.io/v2
kind: CiliumBGPClusterConfig
metadata:
  name: cilium-bgp-config
spec:
  # Optional: use nodeSelector to apply this config to specific nodes
  # nodeSelector:
  #   matchLabels:
  #     bgp-speaker: enabled
  bgpInstances:
    - name: "default-bgp"
      localASN: 65555
      peers:
        - name: "gateway-peer"
          peerAddress: 192.168.3.1
          peerASN: 65000
          # Reference the common peer configuration defined in Step 3
          peerConfigRef:
            name: cilium-peer-config
  serviceAdvertisements:
    # Use 'subnet' mode to advertise the 192.168.3.128/25 CIDR block itself
    - aggregation:
        mode: subnet