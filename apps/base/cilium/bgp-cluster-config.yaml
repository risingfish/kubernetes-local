apiVersion: cilium.io/v2
kind: CiliumBGPClusterConfig
metadata:
  name: cilium-bgp-config
spec:
  bgpInstances:
    - name: default
      localASN: 65555
      peers:
        - peerAddress: 192.168.3.1
          peerASN: 65000
      serviceAdvertisements:
        - aggregation:
            mode: subnet