# bgp-peer-config.yaml
apiVersion: cilium.io/v2
kind: CiliumBGPPeerConfig
metadata:
  name: cilium-peer-config
spec:
  # Link the advertisement policy using a selector matching the labels from Step 2
  advertisements:
    - selector:
        matchLabels:
          bgp.cilium.io/advertise: lb-services
  # Optional configurations (timers, graceful restart, etc.) can be added here
  # Example:
  # families:
  #   - afi: ipv4
  #     safi: unicast
