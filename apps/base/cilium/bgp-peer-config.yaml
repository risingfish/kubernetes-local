apiVersion: cilium.io/v2
kind: CiliumBGPPeerConfig
metadata:
  name: cilium-peer-config
spec:
  # This resource only holds general session parameters (timers, families, auth)
  families:
    - afi: ipv4
      safi: unicast
      advertisements:
        matchLabels:
          bgp.cilium.io/advertise: "true"
  timers:
    holdTimeSeconds: 90
    keepAliveTimeSeconds: 30
  # Set to > 1 if the router is not directly connected (L3 hop away)
  ebgpMultihop: 2