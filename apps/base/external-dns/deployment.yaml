apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  releaseName: external-dns
  interval: 5m # How often to reconcile the release
  timeout: 5m0s

  install:
    remediation:
      retries: 3
    crds: CreateReplace

  upgrade:
    crds: CreateReplace

  chart:
    spec:
      chart: extrernal-dns
      version: '0.20.*'
      sourceRef:
        kind: HelmRepository
        name: external-dns-helm-repo
        namespace: external-dns
      interval: 12h