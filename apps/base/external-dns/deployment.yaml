apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  releaseName: external-dns
  interval: 5m # How often to reconcile the release
  timeout: 5m0s

  install:
    remediation:
      retries: 3
    crds: CreateReplace

  upgrade:
    crds: CreateReplace

  chart:
    spec:
      chart: external-dns
      version: '1.19.*'
      sourceRef:
        kind: HelmRepository
        name: external-dns-helm-repo
        namespace: external-dns
      interval: 12h
  values:
    provider: rfc2136
    rfc2136:
      host: "192.168.3.1" # IP of your BIND server
      port: 53
      zone: "k8s.forthebrew.com"
      tsigKeyname: "externaldns-key"
      tsigSecret: "<your-key-secret>" # Use secretRef in production for better security
      tsigSecretAlg: "hmac-sha256"
    domainFilters:
      - "forthebrew.com"
    sources:
      - ingress
    txtOwnerId: local-cluster