apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  releaseName: kube-prometheus-stack
  interval: 5m # How often to reconcile the release
  timeout: 5m0s

  # Ensure the Helm Controller manages and updates Custom Resource Definitions (CRDs).
  # This is a key feature of Flux's Helm integration.
  install:
    remediation:
        retries: 3
    crds: CreateReplace

  upgrade:
    crds: CreateReplace

  chart:
    spec:
      chart: kube-prometheus-stack
      version: '79.9.*'
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
      interval: 5m

  valuesFrom:
    - kind: ConfigMap
      name: kps-values
      valuesKey: values.yaml

  driftDetection:
    mode: warn
